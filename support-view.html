<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookery Support Documentation</title>
    <link rel="icon" href="/assets/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            background-color: #faf8f5; 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .markdown-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 400;
            color: #1c1917;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e7e5e4;
        }
        .markdown-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 400;
            color: #1c1917;
            margin-top: 48px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e7e5e4;
        }
        .markdown-content h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 400;
            color: #1c1917;
            margin-top: 32px;
            margin-bottom: 12px;
        }
        .markdown-content h4 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 400;
            color: #1c1917;
            margin-top: 24px;
            margin-bottom: 8px;
        }
        .markdown-content p {
            font-size: 16px;
            line-height: 1.7;
            color: #44403c;
            margin-bottom: 16px;
        }
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 16px;
            padding-left: 24px;
        }
        .markdown-content li {
            margin-bottom: 8px;
            line-height: 1.6;
            color: #44403c;
        }
        .markdown-content a {
            color: #ca9627;
            text-decoration: underline;
        }
        .markdown-content a:hover {
            color: #b8861f;
        }
        .markdown-content strong {
            color: #1c1917;
            font-weight: 600;
        }
        .markdown-content code {
            background-color: #f5f3ef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
        }
        .markdown-content pre {
            background-color: #1c1917;
            color: #faf8f5;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
            color: #faf8f5;
        }
        .markdown-content blockquote {
            border-left: 4px solid #ca9627;
            padding-left: 16px;
            margin: 16px 0;
            color: #78716c;
            font-style: italic;
        }
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
        }
        .markdown-content th, .markdown-content td {
            border: 1px solid #e7e5e4;
            padding: 12px;
            text-align: left;
        }
        .markdown-content th {
            background-color: #f5f3ef;
            font-weight: 600;
        }
        .markdown-content hr {
            border: none;
            border-top: 1px solid #e7e5e4;
            margin: 32px 0;
        }
        .toc {
            background: white;
            border: 1px solid #e7e5e4;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 32px;
        }
        .toc h2 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 16px;
            border-bottom: none;
            padding-bottom: 0;
        }
        .toc ul {
            list-style: none;
            padding-left: 0;
            margin-bottom: 0;
        }
        .toc li {
            margin-bottom: 8px;
        }
        .toc a {
            color: #44403c;
            text-decoration: none;
            transition: color 0.2s;
        }
        .toc a:hover {
            color: #ca9627;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-4xl mx-auto px-6 py-12">
        <div class="mb-8">
            <img src="https://static.wixstatic.com/media/7e69ed_330f79c01501431c864036c560eede24~mv2.png/v1/fill/w_432,h_426,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/AppIcon~ios-marketing.png" alt="Cookery Logo" width="80" height="80" class="rounded-lg mb-4">
            <h1 class="font-serif text-4xl text-stone-900" style="font-family: 'Playfair Display', serif;">Support Documentation</h1>
        </div>
        <div id="markdown-content" class="markdown-content">
            <p>Loading documentation...</p>
        </div>
    </div>

    <script>
        // Fetch and render the markdown file
        fetch('support.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to load support.md');
                }
                return response.text();
            })
            .then(markdown => {
                // Configure marked options
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });
                
                // Render markdown to HTML
                const html = marked.parse(markdown);
                document.getElementById('markdown-content').innerHTML = html;
                
                // Smooth scroll for anchor links
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function (e) {
                        e.preventDefault();
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) {
                            target.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start'
                            });
                        }
                    });
                });
            })
            .catch(error => {
                document.getElementById('markdown-content').innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-6">
                        <h2 class="text-red-900 font-semibold mb-2">Error Loading Documentation</h2>
                        <p class="text-red-700">Failed to load support.md: ${error.message}</p>
                        <p class="text-red-600 text-sm mt-2">Make sure support.md is in the same directory as this HTML file.</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
