<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookery Clips - Share Your Culinary Journey</title>
    <meta name="description" content="Share your cooking moments with Cookery Clips. A TikTok-style video sharing platform for food enthusiasts.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background-color: #0f0f0f; 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        .video-container {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            scrollbar-width: none;
        }
        .video-container::-webkit-scrollbar {
            display: none;
        }
        .video-item {
            scroll-snap-align: start;
            height: 100vh;
            position: relative;
        }
        mux-player {
            width: 100%;
            height: 100%;
            display: block;
        }
        .video-overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
            z-index: 10;
        }
        .action-btn {
            transition: transform 0.2s ease;
        }
        .action-btn:active {
            transform: scale(0.9);
        }
        .like-btn.liked {
            color: #ef4444;
        }
        .like-btn.liked svg {
            fill: #ef4444;
        }
        .upload-modal {
            display: none;
        }
        .upload-modal.active {
            display: flex;
        }
        .profile-modal {
            display: none;
        }
        .profile-modal.active {
            display: flex;
        }
        .auth-page {
            display: none;
        }
        .auth-page.active {
            display: flex;
        }
        .follow-btn.following {
            color: #ca9627;
        }
        .follow-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .follow-btn.following {
            background: #ca9627;
        }
        .save-btn.saved {
            color: #ca9627;
        }
        .save-btn.saved svg {
            fill: #ca9627;
        }
    </style>
</head>
<body class="bg-black text-white">
    <!-- Header -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-gradient-to-b from-black/80 to-transparent">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="https://static.wixstatic.com/media/7e69ed_330f79c01501431c864036c560eede24~mv2.png/v1/fill/w_432,h_426,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/AppIcon~ios-marketing.png" alt="Cookery Logo" width="32" height="32" class="rounded-lg">
                <span class="font-serif text-xl font-bold tracking-tight">Cookery Clips</span>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 hover:bg-white/10 rounded-full transition-colors">
                    <i data-lucide="search" style="width: 24px; height: 24px;"></i>
                </button>
                <button id="upload-btn" class="bg-[#ca9627] text-white px-4 py-2 rounded-full font-semibold hover:bg-[#b8861f] transition-colors flex items-center gap-2">
                    <i data-lucide="plus" style="width: 20px; height: 20px;"></i>
                    Upload
                </button>
            </div>
        </div>
    </nav>

    <!-- Video Feed -->
    <div class="video-container" id="video-feed">
        <!-- Videos will be loaded dynamically from database -->
        <div id="no-videos" class="flex items-center justify-center h-full">
            <div class="text-center">
                <i data-lucide="video" style="width: 64px; height: 64px;" class="mx-auto mb-4 text-gray-400"></i>
                <p class="text-xl font-semibold mb-2">No videos yet</p>
                <p class="text-gray-400">Be the first to share a cooking video!</p>
            </div>
        </div>
    </div>

    <!-- Auth/Profile Page -->
    <div id="auth-page" class="auth-page fixed inset-0 bg-black z-[100] flex-col">
        <div class="max-w-lg mx-auto w-full p-6 flex flex-col h-full">
            <div class="flex items-center justify-between mb-8">
                <button id="back-to-feed" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                    <i data-lucide="arrow-left" style="width: 24px; height: 24px;"></i>
                </button>
                <h2 class="text-xl font-bold">Profile</h2>
                <div class="w-10"></div>
            </div>

            <!-- Auth Required Section -->
            <div id="auth-required" class="flex-1 flex flex-col justify-center">
                <div class="text-center mb-8">
                    <img src="https://static.wixstatic.com/media/7e69ed_330f79c01501431c864036c560eede24~mv2.png/v1/fill/w_432,h_426,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/AppIcon~ios-marketing.png" alt="Cookery Logo" width="80" height="80" class="mx-auto mb-4 rounded-lg">
                    <h3 class="text-2xl font-bold mb-2">Welcome to Cookery Clips</h3>
                    <p class="text-gray-400">Sign in to upload videos and interact with the community</p>
                </div>

                <div class="space-y-4">
                    <div id="signin-form">
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" id="signin-email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white" placeholder="your@email.com">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Password</label>
                            <input type="password" id="signin-password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white" placeholder="••••••••">
                        </div>
                        <button id="signin-btn" class="w-full bg-[#ca9627] text-white py-3 rounded-lg font-semibold hover:bg-[#b8861f] transition-colors">
                            Sign In
                        </button>
                        <p class="text-center text-gray-400 text-sm mt-4">
                            Don't have an account? <button id="show-signup" class="text-[#ca9627] hover:underline">Sign Up</button>
                        </p>
                    </div>

                    <div id="signup-form" class="hidden">
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" id="signup-email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white" placeholder="your@email.com">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Password</label>
                            <input type="password" id="signup-password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white" placeholder="••••••••">
                        </div>
                        <button id="signup-btn" class="w-full bg-[#ca9627] text-white py-3 rounded-lg font-semibold hover:bg-[#b8861f] transition-colors">
                            Sign Up
                        </button>
                        <p class="text-center text-gray-400 text-sm mt-4">
                            Already have an account? <button id="show-signin" class="text-[#ca9627] hover:underline">Sign In</button>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Profile Content Section -->
            <div id="profile-content" class="hidden flex-1 overflow-y-auto">
                <div class="flex flex-col items-center mb-8">
                    <div class="relative mb-4">
                        <div id="profile-avatar" class="w-24 h-24 rounded-full bg-[#ca9627] flex items-center justify-center">
                            <span class="text-3xl font-bold">U</span>
                        </div>
                        <button id="change-avatar" class="absolute bottom-0 right-0 bg-white text-black p-2 rounded-full hover:bg-gray-200 transition-colors">
                            <i data-lucide="camera" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                    <h3 id="profile-display-name" class="text-2xl font-bold">User Name</h3>
                    <p id="profile-username" class="text-gray-400">@username</p>
                </div>

                <form id="profile-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Display Name</label>
                        <input type="text" id="display-name-input" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" id="username-input" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Bio</label>
                        <textarea id="bio-input" rows="3" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-[#ca9627] text-white py-3 rounded-lg font-semibold hover:bg-[#b8861f] transition-colors">
                        Save Profile
                    </button>
                </form>

                <button id="signout-btn" class="w-full mt-6 border border-gray-700 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition-colors">
                    Sign Out
                </button>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="upload-modal" class="upload-modal fixed inset-0 bg-black/90 backdrop-blur-lg z-[100] items-center justify-center p-4">
        <div class="bg-gray-900 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold">Upload Video</h2>
                    <button id="close-modal" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                        <i data-lucide="x" style="width: 24px; height: 24px;"></i>
                    </button>
                </div>

                <form id="upload-form">
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2">Video File</label>
                        <input type="file" id="video-file" accept="video/*" required class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2">Title</label>
                        <input type="text" id="video-title" required placeholder="Give your video a title" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white">
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <textarea id="video-description" rows="3" placeholder="Describe your cooking video" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2">Username</label>
                        <input type="text" id="video-username" required placeholder="@yourusername" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white">
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium mb-2">Hashtags (comma separated)</label>
                        <input type="text" id="video-hashtags" placeholder="#cooking, #recipe, #food" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-white">
                    </div>

                    <div id="upload-progress" class="hidden mb-4">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm">Uploading...</span>
                            <span id="progress-percent" class="text-sm">0%</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-2">
                            <div id="progress-bar" class="bg-[#ca9627] h-2 rounded-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>

                    <button type="submit" id="submit-upload" class="w-full bg-[#ca9627] text-white py-3 rounded-lg font-semibold hover:bg-[#b8861f] transition-colors">
                        Upload Video
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-white/10 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-around">
            <button class="flex flex-col items-center text-white">
                <i data-lucide="home" style="width: 24px; height: 24px;"></i>
                <span class="text-xs mt-1">Home</span>
            </button>
            <button class="flex flex-col items-center text-gray-400 hover:text-white transition-colors">
                <i data-lucide="compass" style="width: 24px; height: 24px;"></i>
                <span class="text-xs mt-1">Discover</span>
            </button>
            <button class="flex flex-col items-center">
                <div class="bg-gradient-to-r from-[#ca9627] to-[#b8861f] w-12 h-8 rounded-lg flex items-center justify-center" id="upload-btn-nav">
                    <i data-lucide="plus" style="width: 20px; height: 20px;"></i>
                </div>
            </button>
            <button class="flex flex-col items-center text-gray-400 hover:text-white transition-colors">
                <i data-lucide="inbox" style="width: 24px; height: 24px;"></i>
                <span class="text-xs mt-1">Inbox</span>
            </button>
            <button class="flex flex-col items-center text-gray-400 hover:text-white transition-colors" id="profile-nav">
                <i data-lucide="user" style="width: 24px; height: 24px;"></i>
                <span class="text-xs mt-1">Profile</span>
            </button>
        </div>
    </nav>

    <script>
        // Initialize Supabase
        const { createClient } = supabase;
        const supabaseClient = createClient('https://ojvigxnwweixjhugekmm.supabase.co', 'sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W');

        // Initialize Lucide icons
        lucide.createIcons();

        // State management
        let currentUser = null;
        let userVideos = [];
        let ads = [];

        // Profile page functionality
        const profileNav = document.getElementById('profile-nav');
        const authPage = document.getElementById('auth-page');
        const backToFeed = document.getElementById('back-to-feed');
        const authRequired = document.getElementById('auth-required');
        const profileContent = document.getElementById('profile-content');
        const profileForm = document.getElementById('profile-form');
        const signoutBtn = document.getElementById('signout-btn');
        const signinForm = document.getElementById('signin-form');
        const signupForm = document.getElementById('signup-form');
        const signinBtn = document.getElementById('signin-btn');
        const signupBtn = document.getElementById('signup-btn');
        const showSignup = document.getElementById('show-signup');
        const showSignin = document.getElementById('show-signin');

        function openAuthPage() {
            authPage.classList.add('active');
            if (currentUser) {
                authRequired.classList.add('hidden');
                profileContent.classList.remove('hidden');
                loadUserProfile();
            } else {
                authRequired.classList.remove('hidden');
                profileContent.classList.add('hidden');
            }
        }

        function closeAuthPage() {
            authPage.classList.remove('active');
        }

        profileNav.addEventListener('click', openAuthPage);
        backToFeed.addEventListener('click', closeAuthPage);

        // Toggle between sign in and sign up forms
        showSignup.addEventListener('click', () => {
            signinForm.classList.add('hidden');
            signupForm.classList.remove('hidden');
        });

        showSignin.addEventListener('click', () => {
            signupForm.classList.add('hidden');
            signinForm.classList.remove('hidden');
        });

        // Email/Password Sign In
        signinBtn.addEventListener('click', async () => {
            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;
            } catch (error) {
                console.error('Sign in error:', error);
                alert('Sign in failed: ' + error.message);
            }
        });

        // Email/Password Sign Up
        signupBtn.addEventListener('click', async () => {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password
                });

                if (error) throw error;
                alert('Sign up successful! Please check your email to confirm your account.');
            } catch (error) {
                console.error('Sign up error:', error);
                alert('Sign up failed: ' + error.message);
            }
        });

        // Sign Out
        signoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            currentUser = null;
            localStorage.removeItem('cookery_user');
            openAuthPage();
        });

        // Check for existing session on load
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = {
                    id: session.user.id,
                    display_name: session.user.user_metadata.display_name || session.user.email,
                    username: session.user.user_metadata.username || '@user',
                    bio: session.user.user_metadata.bio || '',
                    avatar: session.user.user_metadata.avatar || null
                };
                localStorage.setItem('cookery_user', JSON.stringify(currentUser));
            }
        }

        // Listen for auth changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                currentUser = {
                    id: session.user.id,
                    display_name: session.user.user_metadata.display_name || session.user.email,
                    username: session.user.user_metadata.username || '@user',
                    bio: session.user.user_metadata.bio || '',
                    avatar: session.user.user_metadata.avatar || null
                };
                localStorage.setItem('cookery_user', JSON.stringify(currentUser));
                openAuthPage();
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                localStorage.removeItem('cookery_user');
            }
        });

        // Load user profile
        function loadUserProfile() {
            if (!currentUser) return;
            
            document.getElementById('profile-display-name').textContent = currentUser.display_name;
            document.getElementById('profile-username').textContent = currentUser.username;
            document.getElementById('display-name-input').value = currentUser.display_name;
            document.getElementById('username-input').value = currentUser.username;
            document.getElementById('bio-input').value = currentUser.bio || '';
            
            if (currentUser.avatar) {
                document.getElementById('profile-avatar').innerHTML = `<img src="${currentUser.avatar}" class="w-full h-full rounded-full object-cover">`;
            }
        }

        // Save profile
        profileForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            currentUser.display_name = document.getElementById('display-name-input').value;
            currentUser.username = document.getElementById('username-input').value;
            currentUser.bio = document.getElementById('bio-input').value;
            
            localStorage.setItem('cookery_user', JSON.stringify(currentUser));
            
            // Update UI
            document.getElementById('profile-display-name').textContent = currentUser.display_name;
            document.getElementById('profile-username').textContent = currentUser.username;
            
            alert('Profile saved successfully!');
        });

        // Upload modal functionality
        const uploadBtn = document.getElementById('upload-btn');
        const uploadBtnNav = document.getElementById('upload-btn-nav');
        const uploadModal = document.getElementById('upload-modal');
        const closeModal = document.getElementById('close-modal');
        const uploadForm = document.getElementById('upload-form');
        const uploadProgress = document.getElementById('upload-progress');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');

        function openModal() {
            if (!currentUser) {
                alert('Please sign in to upload videos');
                openAuthPage();
                return;
            }
            uploadModal.classList.add('active');
        }

        function closeModalHandler() {
            uploadModal.classList.remove('active');
            uploadForm.reset();
            uploadProgress.classList.add('hidden');
        }

        uploadBtn.addEventListener('click', openModal);
        uploadBtnNav.addEventListener('click', openModal);
        closeModal.addEventListener('click', closeModalHandler);

        uploadModal.addEventListener('click', (e) => {
            if (e.target === uploadModal) {
                closeModalHandler();
            }
        });

        // Upload form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentUser) {
                alert('Please sign in to upload videos');
                return;
            }

            const videoFile = document.getElementById('video-file').files[0];
            const title = document.getElementById('video-title').value;
            const description = document.getElementById('video-description').value;
            const username = currentUser.username;
            const hashtags = document.getElementById('video-hashtags').value;

            if (!videoFile) {
                alert('Please select a video file');
                return;
            }

            // Show progress
            uploadProgress.classList.remove('hidden');
            document.getElementById('submit-upload').disabled = true;

            try {
                // Step 1: Get Mux upload URL from videoupload function
                const uploadResponse = await fetch('https://ojvigxnwweixjhugekmm.supabase.co/functions/v1/videoupload', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W'
                    },
                    body: JSON.stringify({
                        action: 'create-upload'
                    })
                });

                const uploadData = await uploadResponse.json();
                
                if (!uploadData.upload_url) {
                    throw new Error('Failed to get upload URL');
                }

                // Step 2: Upload video to Mux through edge function to avoid CORS
                const formData = new FormData();
                formData.append('file', videoFile);
                formData.append('upload_url', uploadData.upload_url);

                const uploadVideoResponse = await fetch('https://ojvigxnwweixjhugekmm.supabase.co/functions/v1/videoupload', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W'
                    },
                    body: formData
                });

                if (!uploadVideoResponse.ok) {
                    throw new Error('Failed to upload video');
                }

                // Step 3: Save metadata to database
                const hashtagsArray = hashtags.split(',').map(tag => tag.trim()).filter(tag => tag);
                
                await fetch('https://ojvigxnwweixjhugekmm.supabase.co/rest/v1/videos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': 'sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W',
                        'Authorization': 'Bearer sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        playback_id: uploadData.upload_id,
                        title,
                        description,
                        username,
                        hashtags: hashtagsArray,
                        user_id: currentUser.id
                    })
                });

                alert('Video uploaded successfully!');
                closeModalHandler();
                loadVideos();
                uploadProgress.classList.add('hidden');
                document.getElementById('submit-upload').disabled = false;

            } catch (error) {
                console.error('Upload error:', error);
                alert('Upload failed: ' + error.message);
                uploadProgress.classList.add('hidden');
                document.getElementById('submit-upload').disabled = false;
            }
        });

        // Load videos from database
        async function loadVideos() {
            try {
                const response = await fetch('https://ojvigxnwweixjhugekmm.supabase.co/rest/v1/videos?order=created_at.desc', {
                    headers: {
                        'apikey': 'sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W',
                        'Authorization': 'Bearer sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W'
                    }
                });

                const videos = await response.json();
                console.log('API Response:', videos); // This will show you exactly what is returned

                if (videos.length === 0) {
                    console.warn('No videos found in database.');
                }

                userVideos = videos;
                await loadAds();
                renderVideos(videos);
            } catch (error) {
                console.error('Failed to load videos:', error);
            }
        }

        // Load ads from JSON file
        async function loadAds() {
            try {
                const response = await fetch('/ads.json');
                const data = await response.json();
                ads = data.ads || [];
            } catch (error) {
                console.error('Failed to load ads:', error);
                ads = [];
            }
        }

        // Render videos to the feed
        function renderVideos(videos) {
            console.log('renderVideos called with:', videos);
            const videoFeed = document.getElementById('video-feed');
            const noVideos = document.getElementById('no-videos');
            
            console.log('videoFeed element:', videoFeed);
            console.log('noVideos element:', noVideos);
            
            if (videos.length === 0 && ads.length === 0) {
                console.log('Showing no videos message');
                noVideos.classList.remove('hidden');
                return;
            }

            console.log('Hiding no videos message and rendering feed');
            noVideos.classList.add('hidden');
            videoFeed.innerHTML = '';

            // Combine videos with ads
            const feedItems = [];
            
            // Add videos
            videos.forEach(video => {
                feedItems.push({ ...video, is_ad: false });
            });

            // Insert ads randomly (every 3-5 videos)
            if (ads.length > 0 && videos.length > 0) {
                const adFrequency = Math.floor(Math.random() * 3) + 3;
                let adIndex = 0;
                
                for (let i = adFrequency; i < feedItems.length; i += adFrequency) {
                    if (adIndex < ads.length) {
                        feedItems.splice(i, 0, { ...ads[adIndex], is_ad: true });
                        adIndex++;
                    }
                }
            }

            console.log('Feed items to render:', feedItems.length);

            feedItems.forEach(item => {
                console.log('Rendering item:', item.id, 'is_ad:', item.is_ad);
                const videoItem = document.createElement('div');
                videoItem.className = 'video-item flex items-center justify-center bg-gradient-to-br from-stone-900 to-black';
                videoItem.dataset.videoId = item.id;
                
                const isAd = item.is_ad;
                const playbackId = isAd ? item.mux_asset_id : item.playback_id;
                const username = isAd ? item.username : item.username;
                const profilePicture = isAd ? item.profile_picture : null;
                const title = isAd ? item.title : item.title;
                const description = isAd ? item.description : item.description;
                const hashtags = isAd ? item.hashtags : item.hashtags;
                
                videoItem.innerHTML = `
                    <div class="relative w-full max-w-md mx-auto h-full">
                        <mux-player 
                            id="video-${item.id}"
                            playback-id="${playbackId}"
                            metadata-video-title="${title}"
                            metadata-viewer-user-id="${currentUser?.id || 'anonymous'}"
                            stream-type="on-demand"
                            autoplay
                            muted
                            loop
                            style="width: 100%; height: 100%;"
                        ></mux-player>
                        
                        <div class="video-overlay absolute inset-0 pointer-events-none z-10">
                            <div class="absolute bottom-0 left-0 right-0 p-4 pb-20">
                                <div class="flex items-center gap-3 mb-3">
                                    ${profilePicture ? 
                                        `<img src="${profilePicture}" alt="User" class="w-10 h-10 rounded-full border-2 border-white">` :
                                        `<div class="w-10 h-10 rounded-full bg-[#ca9627] flex items-center justify-center">
                                            <span class="font-bold">${username.charAt(1).toUpperCase()}</span>
                                        </div>`
                                    }
                                    <div>
                                        <p class="font-semibold">${username}</p>
                                        <p class="text-sm text-gray-300">${title}</p>
                                    </div>
                                    ${isAd ? '<span class="ml-auto bg-amber-500 text-white px-2 py-1 rounded text-xs font-semibold">Sponsored</span>' : ''}
                                </div>
                                <div class="flex flex-wrap gap-2 mb-3">
                                    ${hashtags.map(tag => `<span class="bg-white/20 px-3 py-1 rounded-full text-sm">${tag}</span>`).join('')}
                                </div>
                                <p class="text-sm text-gray-300">${description}</p>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="absolute right-4 bottom-24 flex flex-col gap-6 z-20">
                            ${!isAd ? `
                            <button class="action-btn follow-btn flex flex-col items-center" data-video-id="${item.id}" data-user="${username}">
                                <i data-lucide="user-plus" style="width: 32px; height: 32px;"></i>
                            </button>
                            ` : ''}
                            <button class="action-btn like-btn flex flex-col items-center" data-video-id="${item.id}" ${isAd ? 'disabled' : ''}>
                                <i data-lucide="heart" style="width: 32px; height: 32px;"></i>
                                <span class="text-xs mt-1 like-count">${item.likes || 0}</span>
                            </button>
                            ${!isAd ? `
                            <button class="action-btn comment-btn flex flex-col items-center" data-video-id="${item.id}">
                                <i data-lucide="message-circle" style="width: 32px; height: 32px;"></i>
                                <span class="text-xs mt-1 comment-count">${item.comments || 0}</span>
                            </button>
                            <button class="action-btn share-btn flex flex-col items-center" data-video-id="${item.id}">
                                <i data-lucide="share-2" style="width: 32px; height: 32px;"></i>
                                <span class="text-xs mt-1">Share</span>
                            </button>
                            <button class="action-btn save-btn flex flex-col items-center" data-video-id="${item.id}">
                                <i data-lucide="bookmark" style="width: 32px; height: 32px;"></i>
                                <span class="text-xs mt-1">Save</span>
                            </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                
                videoFeed.appendChild(videoItem);
                
                // Force Mux player to initialize
                setTimeout(() => {
                    const player = document.getElementById(`video-${item.id}`);
                    if (player) {
                        console.log('Mux player initialized for:', playbackId);
                    } else {
                        console.error('Failed to find Mux player element:', `video-${item.id}`);
                    }
                }, 100);
            });

            console.log('Finished rendering, calling lucide.createIcons()');
            lucide.createIcons();
            attachActionListeners();
            console.log('renderVideos completed');
        }

        // Attach action button listeners
        function attachActionListeners() {
            // Like buttons
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    const videoId = this.dataset.videoId;
                    this.classList.toggle('liked');
                    
                    const likeCount = this.querySelector('.like-count');
                    const currentLikes = parseInt(likeCount.textContent);
                    
                    if (this.classList.contains('liked')) {
                        likeCount.textContent = currentLikes + 1;
                        await updateVideoLikes(videoId, currentLikes + 1);
                    } else {
                        likeCount.textContent = currentLikes - 1;
                        await updateVideoLikes(videoId, currentLikes - 1);
                    }
                });
            });

            // Follow buttons
            document.querySelectorAll('.follow-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.classList.toggle('following');
                });
            });

            // Save buttons
            document.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.classList.toggle('saved');
                });
            });

            // Share buttons
            document.querySelectorAll('.share-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (navigator.share) {
                        navigator.share({
                            title: 'Check out this cooking video!',
                            url: window.location.href
                        });
                    } else {
                        alert('Share link copied to clipboard!');
                    }
                });
            });

            // Comment buttons
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const comment = prompt('Add a comment:');
                    if (comment) {
                        alert('Comment added!');
                        const videoId = this.dataset.videoId;
                        const commentCount = this.querySelector('.comment-count');
                        const currentComments = parseInt(commentCount.textContent);
                        commentCount.textContent = currentComments + 1;
                    }
                });
            });
        }

        // Update video likes in database
        async function updateVideoLikes(videoId, likes) {
            try {
                await fetch(`https://ojvigxnwweixjhugekmm.supabase.co/rest/v1/videos?id=eq.${videoId}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': 'sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W',
                        'Authorization': 'Bearer sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W'
                    },
                    body: JSON.stringify({ likes })
                });
            } catch (error) {
                console.error('Failed to update likes:', error);
            }
        }

        // Video scroll snap detection
        const videoFeed = document.getElementById('video-feed');

        videoFeed.addEventListener('scroll', () => {
            const videos = document.querySelectorAll('.video-item');
            videos.forEach((video, index) => {
                const rect = video.getBoundingClientRect();
                if (rect.top >= 0 && rect.top < window.innerHeight / 2) {
                    console.log(`Video ${index + 1} is in view`);
                }
            });
        });

        // Check for existing user session on load
        checkSession();

        // Load videos on page load
        loadVideos();
    </script>
</body>
</html>
