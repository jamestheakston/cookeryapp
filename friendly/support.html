<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Documentation</title>
    <!-- Importing Marked from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- GitHub Markdown CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.6.1/github-markdown.min.css">
    <style>
        .markdown-body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
        }
        .maintenance-notice {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 24px;
            color: #856404;
        }
        .maintenance-notice strong {
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="markdown-body">
        <div class="maintenance-notice">
            <strong>⚠️ Site Under Maintenance</strong>
            The Cookery website is currently under maintenance. Some links and features may not be available. Please check back later.
        </div>
        <div id="content">Loading support documentation...</div>
    </div>

    <script>
        async function loadMarkdown() {
            try {
                const response = await fetch('/friendly/support.md');
                if (!response.ok) throw new Error('Could not find the support file.');
                
                let markdown = await response.text();
                
                // Replace external links with maintenance notice (preserve internal anchor links and support.html)
                markdown = markdown.replace(/\[([^\]]+)\]\((?!#)(?!\/support.html)([^)]+)\)/g, (match, text, url) => {
                    return `[${text}] (currently unavailable due to maintenance)`;
                });
                
                // Configure marked to generate header IDs
                marked.setOptions({
                    gfm: true,
                    breaks: true,
                    headerIds: true,
                    mangle: false
                });
                
                document.getElementById('content').innerHTML = marked.parse(markdown);
                
                // Add smooth scrolling for anchor links
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function (e) {
                        e.preventDefault();
                        const targetId = this.getAttribute('href').substring(1);
                        const targetElement = document.getElementById(targetId);
                        if (targetElement) {
                            targetElement.scrollIntoView({
                                behavior: 'smooth',
                                block: 'start'
                            });
                        }
                    });
                });
            } catch (error) {
                document.getElementById('content').innerHTML = 'Error: ' + error.message;
            }
        }

        loadMarkdown();
    </script>
</body>
</html>
