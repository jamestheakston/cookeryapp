<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookery Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { background-color: #faf8f5; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 py-12">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl border border-stone-200 p-8 card-hover">
            <div class="text-center mb-8">
                <img src="https://static.wixstatic.com/media/7e69ed_330f79c01501431c864036c560eede24~mv2.png/v1/fill/w_432,h_426,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/AppIcon~ios-marketing.png" alt="Cookery Logo" width="64" height="64" class="rounded-lg mx-auto mb-4">
                <h1 class="font-serif text-3xl font-bold text-stone-900 mb-2">Cookery Authentication</h1>
                <p class="text-stone-600">Enter your authentication token to continue</p>
            </div>
            
            <div id="tokenForm">
                <div class="mb-6">
                    <label for="token" class="block text-sm font-medium text-stone-700 mb-2">Authentication Token</label>
                    <input type="text" id="token" placeholder="Enter your 8-character token" maxlength="8" class="w-full px-4 py-3 border border-stone-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#ca9627] focus:border-transparent text-lg text-center tracking-widest" />
                </div>
                <button onclick="validateToken()" class="w-full bg-[#1c1917] text-white py-4 rounded-xl font-semibold hover:bg-[#292524] transition-colors">
                    Validate Token
                </button>
            </div>

            <div id="loading" class="text-center py-8" style="display: none;">
                <div class="inline-flex items-center gap-3">
                    <svg class="animate-spin h-6 w-6 text-[#ca9627]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="text-stone-600">Validating token...</span>
                </div>
            </div>

            <div id="success" class="text-center py-8" style="display: none;">
                <div class="w-20 h-20 bg-[#fdfbeb] rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="material-symbols-outlined text-[#ca9627]" style="font-size: 48px;">check_circle</span>
                </div>
                <h2 class="font-serif text-2xl font-bold text-stone-900 mb-2">Authentication Successful!</h2>
                <p class="text-stone-600">You can now return to Raycast and generate recipes.</p>
            </div>

            <div id="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-center" style="display: none;"></div>
        </div>
        
        <p class="text-center text-stone-500 text-sm mt-6">
            Need help? <a href="support.html" class="text-[#ca9627] hover:underline">Visit Support</a>
        </p>
    </div>

    <script>
        async function validateToken() {
            const token = document.getElementById('token').value.trim();
            
            if (!token || token.length !== 8) {
                showError('Please enter a valid 8-character token');
                return;
            }

            document.getElementById('tokenForm').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // Simple validation - accepts any 8-character token
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            }, 1000);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('tokenForm').style.display = 'block';
        }
    </script>
</body>
</html>
