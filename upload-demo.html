<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Upload Demo - Cookery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf8f5; font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .upload-zone {
            border: 2px dashed #ca9627;
            transition: all 0.3s ease;
        }
        .upload-zone:hover, .upload-zone.dragover {
            background-color: #fdfbeb;
            border-color: #ca9627;
        }
        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <nav class="bg-[#faf8f5] border-b border-stone-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex items-center justify-center">
                <div class="flex items-center gap-3">
                    <img src="https://static.wixstatic.com/media/7e69ed_330f79c01501431c864036c560eede24~mv2.png/v1/fill/w_432,h_426,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/AppIcon~ios-marketing.png" alt="Cookery Logo" width="36" height="36" class="rounded-lg">
                    <span class="font-serif text-xl font-bold text-stone-900 tracking-tight">Cookery</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="py-24 px-6">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-12">
                <h1 class="font-serif text-4xl font-bold text-stone-900 mb-4">Share Your Cooking Journey</h1>
                <p class="text-lg text-stone-600">Upcoming feature: Share recipes and post videos of you making them with the Cookery community</p>
            </div>

            <!-- Upload Zone -->
            <div id="uploadZone" class="upload-zone rounded-2xl p-12 text-center cursor-pointer mb-8">
                <div class="flex flex-col items-center gap-4">
                    <svg class="w-16 h-16 text-[#ca9627]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <div>
                        <p class="text-stone-900 font-semibold mb-2">Drop your video here or click to browse</p>
                        <p class="text-stone-500 text-sm">MP4, MOV, or WebM (max 500MB)</p>
                    </div>
                </div>
                <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/webm" class="hidden">
            </div>

            <!-- Selected File Info -->
            <div id="fileInfo" class="hidden bg-white border border-stone-200 rounded-2xl p-6 mb-8">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-[#fdfbeb] rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-[#ca9627]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <div>
                            <p id="fileName" class="font-semibold text-stone-900"></p>
                            <p id="fileSize" class="text-sm text-stone-500"></p>
                        </div>
                    </div>
                    <button id="removeFile" class="text-stone-400 hover:text-stone-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Upload Progress -->
            <div id="uploadProgress" class="hidden bg-white border border-stone-200 rounded-2xl p-6 mb-8">
                <div class="flex items-center justify-between mb-4">
                    <p class="font-semibold text-stone-900">Uploading...</p>
                    <p id="progressPercent" class="text-sm text-stone-500">0%</p>
                </div>
                <div class="w-full bg-stone-200 rounded-full h-2">
                    <div id="progressBar" class="progress-bar bg-[#ca9627] h-2 rounded-full" style="width: 0%"></div>
                </div>
                <p id="uploadStatus" class="text-sm text-stone-500 mt-2">Initializing upload...</p>
            </div>

            <!-- Upload Button -->
            <button id="uploadBtn" disabled class="w-full bg-[#1c1917] text-white py-4 rounded-xl font-semibold hover:bg-[#292524] transition-colors disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:bg-[#1c1917]">
                Upload Video
            </button>

            <!-- Success Message -->
            <div id="successMessage" class="hidden bg-green-50 border border-green-200 rounded-2xl p-6 mt-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="font-semibold text-green-900">Upload Complete!</p>
                        <p id="uploadId" class="text-sm text-green-700"></p>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 rounded-2xl p-6 mt-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </div>
                    <div>
                        <p class="font-semibold text-red-900">Upload Failed</p>
                        <p id="errorText" class="text-sm text-red-700"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const removeFile = document.getElementById('removeFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressBar = document.getElementById('progressBar');
        const progressPercent = document.getElementById('progressPercent');
        const uploadStatus = document.getElementById('uploadStatus');
        const successMessage = document.getElementById('successMessage');
        const uploadId = document.getElementById('uploadId');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        let selectedFile = null;

        // Replace with your Supabase Edge Function URL
        const SUPABASE_FUNCTION_URL = 'https://ojvigxnwweixjhugekmm.supabase.co/functions/v1/mux-video-upload';

        // File selection handlers
        uploadZone.addEventListener('click', () => fileInput.click());
        
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelect(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        removeFile.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            uploadBtn.disabled = true;
            resetUploadState();
        });

        function handleFileSelect(file) {
            if (!file.type.startsWith('video/')) {
                showError('Please select a video file');
                return;
            }

            if (file.size > 500 * 1024 * 1024) {
                showError('File size must be less than 500MB');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.classList.remove('hidden');
            uploadBtn.disabled = false;
            resetUploadState();
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function resetUploadState() {
            uploadProgress.classList.add('hidden');
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');
            progressBar.style.width = '0%';
            progressPercent.textContent = '0%';
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.remove('hidden');
            setTimeout(() => errorMessage.classList.add('hidden'), 5000);
        }

        // Upload handler
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            resetUploadState();
            uploadProgress.classList.remove('hidden');
            uploadBtn.disabled = true;
            uploadStatus.textContent = 'Getting upload URL...';

            try {
                // Get upload URL from Supabase Edge Function
                const response = await fetch(SUPABASE_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                if (!response.ok) {
                    throw new Error('Failed to get upload URL');
                }

                const { uploadUrl, uploadId: muxUploadId } = await response.json();
                uploadStatus.textContent = 'Uploading to Mux...';

                // Upload to Mux
                await uploadToMux(uploadUrl, selectedFile);

                // Success
                uploadId.textContent = `Upload ID: ${muxUploadId}`;
                successMessage.classList.remove('hidden');
                uploadStatus.textContent = 'Upload complete!';
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';

            } catch (error) {
                console.error('Upload error:', error);
                showError(error.message || 'Upload failed. Please try again.');
                uploadStatus.textContent = 'Upload failed';
            } finally {
                uploadBtn.disabled = false;
            }
        });

        async function uploadToMux(uploadUrl, file) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        progressBar.style.width = percentComplete + '%';
                        progressPercent.textContent = percentComplete + '%';
                        uploadStatus.textContent = `Uploading... ${percentComplete}%`;
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        resolve();
                    } else {
                        reject(new Error('Upload failed'));
                    }
                });

                xhr.addEventListener('error', () => {
                    reject(new Error('Network error during upload'));
                });

                xhr.open('PUT', uploadUrl);
                xhr.setRequestHeader('Content-Type', file.type);
                xhr.send(file);
            });
        }
    </script>
</body>
</html>
