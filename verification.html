<script>
    function onCaptchaSuccess(token) {
        // Mark user as verified in session storage
        sessionStorage.setItem('verified', 'true');
        sessionStorage.setItem('verifiedTime', Date.now().toString());
        
        // Get the redirect URL from URL parameter or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || localStorage.getItem('redirectUrl');
        
        // Clear localStorage redirect
        localStorage.removeItem('redirectUrl');
        
        if (redirectUrl && redirectUrl !== 'back') {
            window.location.href = redirectUrl;
        } else {
            window.history.back();
        }
    }
</script>
