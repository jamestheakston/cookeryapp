<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Closed - Cookery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200..800&display=stylesheet" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body {
            background-color: #faf8f5;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .hero-gradient {
            background: linear-gradient(135deg, #faf8f5 0%, #f5f3ef 100%);
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e7e5e4;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }
        .font-serif-brand {
            font-family: 'Playfair Display', Georgia, serif;
        }
        .btn-primary {
            background-color: #1c1917;
            color: #ffffff;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #292524;
        }
        .btn-secondary {
            background-color: transparent;
            border: 1px solid #d6d3d1;
            color: #1c1917;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background-color: #faf8f5;
            border-color: #1c1917;
        }
        .btn-primary, .btn-secondary {
            padding: 10px 20px;
        }
    </style>
</head>
<body class="min-h-screen hero-gradient flex items-center justify-center px-6 py-12">

    <div class="card max-w-md w-full p-10 text-center">
        <div class="flex items-center justify-center gap-3 mb-8">
            <img src="https://static.wixstatic.com/media/7e69ed_330f79c01501431c864036c560eede24~mv2.png/v1/fill/w_432,h_426,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/AppIcon~ios-marketing.png" alt="Cookery Logo" width="36" height="36" class="rounded-lg">
            <span class="font-serif-brand text-xl font-bold text-stone-900 tracking-tight">Cookery</span>
        </div>

        <div class="w-14 h-14 bg-[#fdfbeb] border border-[#fbf5c4] rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="clock-alert" class="text-[#ca9627]" style="width: 28px; height: 28px;"></i>
        </div>

        <h1 class="font-serif-brand text-3xl font-bold text-stone-900 mb-3 leading-tight">
            Your Cookery API session has ended
        </h1>
        <p class="text-stone-600 mb-8 leading-relaxed">
            Your API application session has been closed. For your security, we recommend closing this browser window. You can start a new application at any time.
        </p>

        <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href="/api.html" class="btn-primary w-full sm:w-auto px-8 py-3 rounded-full font-semibold text-sm inline-flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                Start New Application
            </a>
            <a href="/index.html" class="btn-secondary w-full sm:w-auto px-8 py-3 rounded-full font-semibold text-sm inline-flex items-center justify-center gap-2">
                <i data-lucide="house" style="width: 16px; height: 16px;"></i>
                Return Home
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>
