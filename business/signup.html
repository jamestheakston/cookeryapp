<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Cookery for Business</title>
    <link rel="icon" href="/assets/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #faf8f5; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e7e5e4;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #ca9627;
            box-shadow: 0 0 0 3px rgba(202, 150, 39, 0.1);
        }
        .submit-btn {
            background-color: #1c1917;
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #292524;
        }
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <img src="https://static.wixstatic.com/media/7e69ed_330f79c01501431c864036c560eede24~mv2.png/v1/fill/w_432,h_426,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/AppIcon~ios-marketing.png" alt="Cookery Logo" width="64" height="64" class="rounded-lg mx-auto mb-4">
            <h1 class="font-serif text-3xl font-bold text-stone-900 mb-2">Create Your Account</h1>
            <p class="text-stone-600">Start your culinary journey with Cookery for Business</p>
        </div>

        <div class="bg-white border border-stone-200 rounded-2xl p-8">
            <form id="signup-form">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-stone-900 mb-2">Email</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
                </div>

                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-stone-900 mb-2">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required minlength="6">
                </div>

                <div id="error-message" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                    <p class="text-red-900 text-sm"></p>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn w-full">Sign Up</button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-stone-600 text-sm">
                    Already have an account? <a href="login.html" class="text-[#ca9627] font-semibold hover:underline">Log in</a>
                </p>
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="../business.html" class="text-stone-600 hover:text-stone-900 text-sm">← Back to plans</a>
        </div>
    </div>

    <script>
        // Initialize Supabase client
        const SUPABASE_URL = 'https://ojvigxnwweixjhugekmm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ok_vkZ1FDJ_hv-qdv76tJw_RJ78nd6W';
        const SupabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const signupForm = document.getElementById('signup-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const errorMessage = document.getElementById('error-message');

        signupForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value;
            const password = passwordInput.value;

            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            errorMessage.classList.add('hidden');

            try {
                const { data, error } = await SupabaseClient.auth.signUp({
                    email: email,
                    password: password,
                });

                if (error) {
                    throw error;
                }

                // Redirect to app on successful signup
                window.location.href = 'app.html';
            } catch (error) {
                errorMessage.querySelector('p').textContent = error.message || 'An error occurred during signup';
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
